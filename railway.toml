[build]
buildCommand = "npm install --omit=dev"

[deploy]
startCommand = "node -e \"const fs=require('fs');try{fs.copyFileSync('src/views/app.ejs','dist/views/app.ejs');fs.copyFileSync('src/public/shipping-preview.js','dist/public/shipping-preview.js');console.log('Files copied OK');}catch(e){console.error('Copy failed:',e.message);}\" && node dist/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
