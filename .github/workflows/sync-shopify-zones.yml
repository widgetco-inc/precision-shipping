name: Sync Shopify Shipping Zones

# Pulls the list of countries from Shopify Admin API shipping_zones and
# overwrites data/shopify-countries.json. Shopify is the sole source of truth.
#
# Triggers:
#   - schedule: daily at 06:00 UTC
#   - workflow_dispatch: click "Run workflow" in the Actions tab for a manual sync

on:
  schedule:
      - cron: '0 6 * * *'
        workflow_dispatch:

        permissions:
          contents: write

          concurrency:
            group: sync-shopify-zones
              cancel-in-progress: false

              jobs:
                sync:
                    runs-on: ubuntu-latest
                        env:
                              SHOPIFY_STORE: widgetco-inc.myshopify.com
                                    SHOPIFY_API_VERSION: '2024-10'
                                        steps:
                                              - name: Checkout
                                                      uses: actions/checkout@v4

                                                            - name: Fetch shipping zones from Shopify
                                                                    id: fetch
                                                                            env:
                                                                                      SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_SHIPPING_ZONE_TOKEN }}
                                                                                              run: |
                                                                                                        set -euo pipefail
                                                                                                                  if [ -z "${SHOPIFY_TOKEN:-}" ]; then
                                                                                                                              echo "::error::SHOPIFY_SHIPPING_ZONE_TOKEN is not set"
                                                                                                                                          exit 1
                                                                                                                                                    fi
                                                                                                                                                              curl -sS --fail \
                                                                                                                                                                          -H "X-Shopify-Access-Token: ${SHOPIFY_TOKEN}" \
                                                                                                                                                                                      -H "Accept: application/json" \
                                                                                                                                                                                                  "https://${SHOPIFY_STORE}/admin/api/${SHOPIFY_API_VERSION}/shipping_zones.json" \
                                                                                                                                                                                                              -o shipping_zones.json
                                                                                                                                                                                                                        echo "Fetched $(wc -c < shipping_zones.json) bytes"
                                                                                                                                                                                                                        
                                                                                                                                                                                                                              - name: Build data/shopify-countries.json
                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                node --input-type=module -e '
                                                                                                                                                                                                                                                            import fs from "node:fs";
                                                                                                                                                                                                                                                                        const raw = JSON.parse(fs.readFileSync("shipping_zones.json", "utf8"));
                                                                                                                                                                                                                                                                                    const zones = raw.shipping_zones || [];
                                                                                                                                                                                                                                                                                                const byCode = new Map();
                                                                                                                                                                                                                                                                                                            for (const z of zones) {
                                                                                                                                                                                                                                                                                                                          for (const c of (z.countries || [])) {
                                                                                                                                                                                                                                                                                                                                          if (!c || !c.code) continue;
                                                                                                                                                                                                                                                                                                                                                          // Shopify uses "*" as the wildcard for Rest of World provinces; ignore wildcard codes
                                                                                                                                                                                                                                                                                                                                                                          if (c.code === "*") continue;
                                                                                                                                                                                                                                                                                                                                                                                          if (!byCode.has(c.code)) {
                                                                                                                                                                                                                                                                                                                                                                                                            byCode.set(c.code, { code: c.code, name: c.name || c.code });
                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const countries = Array.from(byCode.values())
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .sort((a, b) => a.name.localeCompare(b.name));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const out = {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          lastSyncedAt: new Date().toISOString(),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        source: `Shopify Admin API ${process.env.SHOPIFY_API_VERSION} / shipping_zones`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      countries
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              fs.mkdirSync("data", { recursive: true });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          fs.writeFileSync("data/shopify-countries.json", JSON.stringify(out, null, 2) + "\n");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      console.log(`Wrote ${countries.length} countries`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          rm -f shipping_zones.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Commit if changed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  set -euo pipefail
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git config user.name  "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if git diff --quiet -- data/shopify-countries.json; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "No changes to commit."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        exit 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            TODAY=$(date -u +%Y-%m-%d)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add data/shopify-countries.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git commit -m "chore(sync): update Shopify shipping zones (${TODAY})"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git push origin HEAD:main
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
