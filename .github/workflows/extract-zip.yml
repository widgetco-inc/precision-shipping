name: Extract ZIP and Commit Files

on:
  workflow_dispatch:

  jobs:
    extract-zip:
        runs-on: ubuntu-latest
            permissions:
                  contents: write

                      steps:
                            - name: Checkout repository
                                    uses: actions/checkout@v4

                                          - name: Extract ZIP file
                                                  run: |
                                                            unzip -o widgetco-shipping-app-open-access.zip -d extracted_zip
                                                                      # Move contents up if there's a single top-level folder
                                                                                shopt -s dotglob
                                                                                          EXTRACTED_DIR="extracted_zip"
                                                                                                    ITEMS=("$EXTRACTED_DIR"/*)
                                                                                                              if [ ${#ITEMS[@]} -eq 1 ] && [ -d "${ITEMS[0]}" ]; then
                                                                                                                          mv "${ITEMS[0]}"/* .
                                                                                                                                      rmdir "${ITEMS[0]}"
                                                                                                                                                else
                                                                                                                                                            mv "$EXTRACTED_DIR"/* .
                                                                                                                                                                      fi
                                                                                                                                                                                rmdir "$EXTRACTED_DIR"
                                                                                                                                                                                          rm -f widgetco-shipping-app-open-access.zip
                                                                                                                                                                                          
                                                                                                                                                                                                - name: Commit and push extracted files
                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                  git config user.name "github-actions[bot]"
                                                                                                                                                                                                                            git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                      git add -A
                                                                                                                                                                                                                                                git commit -m "Extract widgetco-shipping-app-open-access.zip"
                                                                                                                                                                                                                                                          git push
